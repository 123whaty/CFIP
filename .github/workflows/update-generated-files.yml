name: Update generated files

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/update-generated-files.yml"
      - "py/**"
      - "requirements.txt"
  schedule:
    - cron: "0 */1 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-generated-files
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate outputs
        shell: bash
        run: |
          set +e

          outputs=(
            "py/All.py:All.txt"
            "py/Cdtools.py:Cdtools.txt"
            "py/Cfxyz.py:Cfxyz.txt"
            "py/DE.py:DE.txt"
            "py/Domain.py:Domain.txt"
            "py/JP.py:JP.txt"
            "py/Me.py:Me.txt"
            "py/NL.py:NL.txt"
            "py/SG.py:SG.txt"
            "py/US.py:US.txt"
            "py/Vless.py:Vless.txt"
          )

          failed=0
          for item in "${outputs[@]}"; do
            script="${item%%:*}"
            output="${item##*:}"
            tmp="$(mktemp)"

            echo "Running ${script} -> ${output}"
            python "$script" > "$tmp"
            status=$?

            if [ "$status" -eq 0 ] && [ -s "$tmp" ]; then
              mv "$tmp" "$output"
            else
              echo "::warning file=${script}::Generation failed or produced empty output; keeping existing ${output}"
              cat "$tmp"
              rm -f "$tmp"
              failed=1
            fi
          done

          if [ "$failed" -ne 0 ]; then
            echo "One or more generators failed; successful outputs were still refreshed."
          fi

      - name: Commit results
        shell: bash
        run: |
          outputs=(
            "All.txt"
            "Cdtools.txt"
            "Cfxyz.txt"
            "DE.txt"
            "Domain.txt"
            "JP.txt"
            "Me.txt"
            "NL.txt"
            "SG.txt"
            "US.txt"
            "Vless.txt"
          )

          if git diff --quiet -- "${outputs[@]}"; then
            echo "No changes to commit"
            exit 0
          fi

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add "${outputs[@]}"
          git commit -m "Auto update generated files [skip ci]"
          git pull --rebase --autostash origin "${GITHUB_REF_NAME:-main}"
          git push
